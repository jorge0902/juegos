<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Super Dragon Bros</title>
    <style>
        /* Reseteo total para eliminar cualquier scroll o margen */
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }

        body {
            background-color: #000;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed; /* Evita scrolls accidentales en móviles */
        }

        /* Contenedor responsivo */
        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #000;
        }

        /* Ajuste específico para Escritorio (para que no se vea gigante) */
        @media (min-width: 1024px) {
            #game-container {
                max-width: 800px;
                max-height: 450px;
                margin: auto;
                box-shadow: 0 0 30px rgba(0,0,0,0.8);
                border: 2px solid #333;
                border-radius: 4px;
            }
        }

        /* Mensaje para forzar rotación en móviles */
        #rotate-warning {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; text-align: center; padding: 20px;
        }

        @media (orientation: portrait) {
            #rotate-warning { display: flex; }
            #game-container { display: none; }
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Garantiza bandas negras sin estiramiento */
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
</head>
<body>
    <div id="game-container"></div>
    <div id="rotate-warning">
        <h1>🔄 Por favor, gira tu dispositivo</h1>
        <p>Este juego se disfruta mejor en posición horizontal (Landscape).</p>
    </div>
    
    <!-- Música de fondo -->
    <audio id="music-exterior" loop>
        <source src="musica/Above_the_Clouds.mp3" type="audio/mpeg">
    </audio>
    <audio id="music-cueva" loop>
        <source src="musica/pantalla 2 music/Below_the_Observation_Deck.mp3" type="audio/mpeg">
    </audio>
    
    <script>
        // Control de música dinámico
        const musicExterior = document.getElementById('music-exterior');
        const musicCueva = document.getElementById('music-cueva');
        
        musicExterior.volume = 0.5;
        musicCueva.volume = 0.5;
        
        // Función para cambiar la música según el mundo
        window.cambiarMusica = function(esCueva) {
            if (esCueva) {
                musicExterior.pause();
                musicExterior.currentTime = 0;
                musicCueva.play().catch(err => console.log('Error al reproducir música cueva:', err));
            } else {
                musicCueva.pause();
                musicCueva.currentTime = 0;
                musicExterior.play().catch(err => console.log('Error al reproducir música exterior:', err));
            }
        };
        
        // Inicia con música exterior
        document.addEventListener('click', () => {
            musicExterior.play().catch(err => console.log('Auto-play bloqueado:', err));
        });
    </script>
    
    <script src="mariobross1.js"></script>
</body>
</html>
