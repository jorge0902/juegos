<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Dragon Bros</title>
    <style>
        /* Eliminamos cualquier margen que el navegador ponga por defecto */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000; /* Fondo negro */
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center; /* Centro horizontal */
            align-items: center;     /* Centro vertical */
            overflow: hidden;        /* Evita barras de scroll */
        }

        /* Contenedor responsivo */
        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Mensaje para forzar rotación en móviles */
        #rotate-warning {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; text-align: center; padding: 20px;
        }

        @media (orientation: portrait) {
            #rotate-warning { display: flex; }
            #game-container { display: none; }
        }

        canvas {
            image-rendering: pixelated; /* Píxeles nítidos */
            max-width: 100%;
            max-height: 100%;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
</head>
<body>
    <div id="game-container"></div>
    <div id="rotate-warning">
        <h1>🔄 Por favor, gira tu dispositivo</h1>
        <p>Este juego se disfruta mejor en posición horizontal (Landscape).</p>
    </div>
    <script src="mariobross1.js"></script>
</body>
</html>
